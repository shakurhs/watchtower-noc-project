<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower NOC Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            color: #ff6600;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
        }

        .card h2 {
            color: #ff6600;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #00ff00;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 5px;
        }

        .badge-dynatrace { background: #1e88e5; color: white; }
        .badge-prometheus { background: #e6522c; color: white; }
        .badge-splunk { background: #65a637; color: white; }
        .badge-riverbed { background: #9c27b0; color: white; }

        .p1 { border-left: 4px solid #ff0000; }
        .p2 { border-left: 4px solid #ff6600; }
        .p3 { border-left: 4px solid #ffcc00; }
        .p4 { border-left: 4px solid #00cc00; }

        .event-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .event-item {
            background: #2a2a2a;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 12px;
        }

        .anomaly-item {
            background: #3a1a1a;
            border-left: 4px solid #ff0000;
        }

        .forecast-item {
            background: #1a2a3a;
            border-left: 4px solid #0099ff;
        }

        .confidence-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 5px;
            vertical-align: middle;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6600, #ff0000);
        }

        .drop-counter {
            font-size: 24px;
            color: #ff0000;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        .status-live { background: #00ff00; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timestamp {
            color: #666;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h1>🔭 Watchtower NOC Dashboard</h1>
    <p class="subtitle">
        <span class="status-indicator status-live"></span>
        Real-time Monitoring & Anomaly Detection
    </p>

    <div class="grid">
        <!-- Drop Counter -->
        <div class="card">
            <h2>📊 Event Drop Counter</h2>
            <div class="drop-counter" id="dropCount">0</div>
            <div class="stat">
                <span class="stat-label">Last Updated:</span>
                <span class="stat-value" id="lastUpdated">-</span>
            </div>
        </div>

        <!-- Source Rates -->
        <div class="card">
            <h2>📈 Event Rate (events/sec)</h2>
            <div id="sourceRates"></div>
        </div>
    </div>

    <div class="grid">
        <!-- Recent Events -->
        <div class="card" style="grid-column: span 2;">
            <h2>📋 Recent Events (Last 50)</h2>
            <div class="event-list" id="recentEvents"></div>
        </div>
    </div>

    <div class="grid">
        <!-- Active Anomalies -->
        <div class="card">
            <h2>🚨 Active Anomalies</h2>
            <div class="event-list" id="activeAnomalies"></div>
        </div>

        <!-- Latest Forecasts -->
        <div class="card">
            <h2>📊 Trend Forecasts</h2>
            <div class="event-list" id="latestForecasts"></div>
        </div>
    </div>

    <script>
        // State global
        let state = {
            recent_events: [],
            source_rates: {},
            active_anomalies: [],
            latest_forecasts: {},
            drop_count: 0,
            last_updated: null
        };

        // Fungsi untuk format timestamp
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('id-ID');
        }

        // Fungsi untuk render source rates
        function renderSourceRates() {
            const container = document.getElementById('sourceRates');
            container.innerHTML = '';
            
            for (const [source, rate] of Object.entries(state.source_rates)) {
                const div = document.createElement('div');
                div.className = 'stat';
                div.innerHTML = `
                    <span class="stat-label">
                        <span class="badge badge-${source.toLowerCase()}">${source}</span>
                    </span>
                    <span class="stat-value">${rate.toFixed(2)}</span>
                `;
                container.appendChild(div);
            }
        }

        // Fungsi untuk render recent events
        function renderRecentEvents() {
            const container = document.getElementById('recentEvents');
            container.innerHTML = '';
            
            // Tampilkan dari terbaru ke terlama
            const events = [...state.recent_events].reverse();
            
            events.forEach(event => {
                const div = document.createElement('div');
                div.className = 'event-item';
                
                const timestamp = formatTime(event.timestamp * 1000);
                const payloadKeys = Object.keys(event.payload || {}).join(', ');
                
                div.innerHTML = `
                    <span class="badge badge-${event.source.toLowerCase()}">${event.source}</span>
                    <span class="timestamp">${timestamp}</span>
                    <div style="margin-top: 5px; color: #aaa; font-size: 11px;">
                        ID: ${event.id.substring(0, 8)}... | Metrics: ${payloadKeys}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Fungsi untuk render anomalies
        function renderAnomalies() {
            const container = document.getElementById('activeAnomalies');
            container.innerHTML = '';
            
            const anomalies = [...state.active_anomalies].reverse();
            
            anomalies.forEach(anomaly => {
                const div = document.createElement('div');
                div.className = 'event-item anomaly-item';
                
                const confidencePercent = (anomaly.confidence * 100).toFixed(0);
                const timestamp = formatTime(anomaly.timestamp);
                
                div.innerHTML = `
                    <div style="margin-bottom: 5px;">
                        <span class="badge badge-${anomaly.source.toLowerCase()}">${anomaly.source}</span>
                        <strong>${anomaly.metric}</strong>
                    </div>
                    <div style="font-size: 12px;">
                        <div>Expected: <span style="color: #888;">${anomaly.expected.toFixed(2)}</span></div>
                        <div>Actual: <span style="color: #ff0000;">${anomaly.value.toFixed(2)}</span></div>
                        <div>
                            Confidence: ${confidencePercent}%
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${confidencePercent}%;"></div>
                            </div>
                        </div>
                        <div class="timestamp">${timestamp}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Fungsi untuk render forecasts
        function renderForecasts() {
            const container = document.getElementById('latestForecasts');
            container.innerHTML = '';
            
            for (const [key, forecast] of Object.entries(state.latest_forecasts)) {
                const div = document.createElement('div');
                div.className = 'event-item forecast-item';
                
                const horizonTime = formatTime(forecast.horizon_time);
                
                div.innerHTML = `
                    <div style="margin-bottom: 5px;">
                        <span class="badge badge-${forecast.source.toLowerCase()}">${forecast.source}</span>
                        <strong>${forecast.metric}</strong>
                    </div>
                    <div style="font-size: 12px;">
                        <div>Predicted: <span style="color: #0099ff;">${forecast.predicted.toFixed(2)}</span></div>
                        <div class="timestamp">Horizon: ${horizonTime}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        // Fungsi untuk update semua UI
        function updateUI() {
            document.getElementById('dropCount').textContent = state.drop_count;
            document.getElementById('lastUpdated').textContent = formatTime(state.last_updated);
            
            renderSourceRates();
            renderRecentEvents();
            renderAnomalies();
            renderForecasts();
        }

        // Fetch initial state
        async function fetchInitialState() {
            try {
                const response = await fetch('/api/state');
                state = await response.json();
                updateUI();
            } catch (error) {
                console.error('Failed to fetch initial state:', error);
            }
        }

        // Setup SSE
        function setupSSE() {
            const eventSource = new EventSource('/stream');
            
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Update state berdasarkan tipe data
                    if (data.confidence !== undefined) {
                        // Ini adalah AnomalyResult
                        state.active_anomalies.push(data);
                        if (state.active_anomalies.length > 20) {
                            state.active_anomalies.shift();
                        }
                    } else if (data.predicted !== undefined) {
                        // Ini adalah ForecastResult
                        const key = data.source + '_' + data.metric;
                        state.latest_forecasts[key] = data;
                    }
                    
                    updateUI();
                } catch (error) {
                    console.error('Failed to parse SSE message:', error);
                }
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE Error:', error);
            };
        }

        // Polling untuk update state (setiap 5 detik)
        function startPolling() {
            setInterval(async () => {
                try {
                    const response = await fetch('/api/state');
                    const newState = await response.json();
                    
                    // Update hanya field yang berubah
                    state.recent_events = newState.recent_events;
                    state.source_rates = newState.source_rates;
                    state.drop_count = newState.drop_count;
                    state.last_updated = newState.last_updated;
                    
                    updateUI();
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 5000);
        }

        // Inisialisasi
        fetchInitialState();
        setupSSE();
        startPolling();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower NOC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #e0e0e0;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-size: 13px;
        }

        .stat-badge.live {
            border-color: #34c759;
            color: #34c759;
        }

        /* Source Rates Grid */
        .source-rates {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .rate-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 20px;
        }

        .rate-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            margin-bottom: 8px;
        }

        .rate-value {
            font-size: 32px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .rate-unit {
            font-size: 14px;
            color: #888888;
            margin-left: 4px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 20px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
        }

        .panel-header h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
        }

        /* Event Feed */
        .event-feed {
            max-height: 500px;
            overflow-y: auto;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: #222222;
        }

        .priority-badge {
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .priority-p1 { background: #ff3b30; color: #fff; }
        .priority-p2 { background: #ff9500; color: #fff; }
        .priority-p3 { background: #ffcc00; color: #000; }
        .priority-p4 { background: #007aff; color: #fff; }

        .event-source {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 80px;
        }

        .event-time {
            font-size: 12px;
            color: #666666;
            margin-left: auto;
        }

        /* Anomaly Alerts */
        .anomaly-item {
            padding: 15px;
            background: #1f1f1f;
            border-left: 3px solid #ff3b30;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .anomaly-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .anomaly-metric {
            font-weight: 600;
            color: #e0e0e0;
        }

        .anomaly-confidence {
            font-size: 12px;
            color: #ff3b30;
        }

        .anomaly-details {
            font-size: 13px;
            color: #888888;
        }

        /* Forecasts */
        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #1f1f1f;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .forecast-metric {
            font-weight: 600;
            color: #e0e0e0;
        }

        .forecast-value {
            font-size: 18px;
            color: #e0e0e0;
        }

        .forecast-ci {
            font-size: 12px;
            color: #888888;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>WATCHTOWER NOC</h1>
            <div class="header-stats">
                <div class="stat-badge live" id="status">CONNECTING...</div>
                <div class="stat-badge">DROP: <span id="drop-count">0</span></div>
            </div>
        </div>

        <!-- Source Rates -->
        <div class="source-rates" id="source-rates">
            <div class="rate-card">
                <h3>Dynatrace</h3>
                <div class="rate-value">0.0<span class="rate-unit">/s</span></div>
            </div>
            <div class="rate-card">
                <h3>Prometheus</h3>
                <div class="rate-value">0.0<span class="rate-unit">/s</span></div>
            </div>
            <div class="rate-card">
                <h3>Splunk</h3>
                <div class="rate-value">0.0<span class="rate-unit">/s</span></div>
            </div>
            <div class="rate-card">
                <h3>Riverbed</h3>
                <div class="rate-value">0.0<span class="rate-unit">/s</span></div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Event Feed -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Event Feed</h2>
                    <span id="event-count">0 events</span>
                </div>
                <div class="event-feed" id="event-feed"></div>
            </div>

            <!-- Anomaly Alerts -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Anomaly Alerts</h2>
                    <span id="anomaly-count">0</span>
                </div>
                <div id="anomaly-feed"></div>
            </div>
        </div>

        <!-- Forecasts -->
        <div class="panel">
            <div class="panel-header">
                <h2>Forecasts</h2>
                <span id="forecast-count">0 metrics</span>
            </div>
            <div id="forecast-feed"></div>
        </div>
    </div>

    <script>
        const evtSource = new EventSource('/stream');
        const statusEl = document.getElementById('status');
        const dropCountEl = document.getElementById('drop-count');
        const eventFeedEl = document.getElementById('event-feed');
        const anomalyFeedEl = document.getElementById('anomaly-feed');
        const forecastFeedEl = document.getElementById('forecast-feed');
        const eventCountEl = document.getElementById('event-count');
        const anomalyCountEl = document.getElementById('anomaly-count');
        const forecastCountEl = document.getElementById('forecast-count');
        const sourceRatesEl = document.getElementById('source-rates');

        let events = [];
        let anomalies = [];
        let forecasts = {};

        evtSource.onopen = () => {
            statusEl.textContent = 'LIVE';
            statusEl.classList.add('live');
        };

        evtSource.onerror = () => {
            statusEl.textContent = 'DISCONNECTED';
            statusEl.classList.remove('live');
        };

        evtSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            if (data.type === 'event') {
                events.unshift(data.payload);
                if (events.length > 50) events.pop();
                renderEvents();
            } else if (data.type === 'anomaly') {
                anomalies.unshift(data.payload);
                if (anomalies.length > 20) anomalies.pop();
                renderAnomalies();
            } else if (data.type === 'forecast') {
                const key = data.payload.source + '_' + data.payload.metric;
                forecasts[key] = data.payload;
                renderForecasts();
            }
        };

        // Fetch initial state
        fetch('/api/state')
            .then(r => r.json())
            .then(state => {
                events = state.recent_events || [];
                anomalies = state.active_anomalies || [];
                forecasts = state.latest_forecasts || {};
                dropCountEl.textContent = state.drop_count || 0;
                
                renderEvents();
                renderAnomalies();
                renderForecasts();
                renderSourceRates(state.source_rates || {});
            });

        function renderEvents() {
            eventFeedEl.innerHTML = events.map(event => {
                const time = new Date(event.timestamp * 1000).toLocaleTimeString();
                const priority = event.priority || 'P4';
                return `
                    <div class="event-item">
                        <span class="priority-badge priority-${priority.toLowerCase()}">${priority}</span>
                        <span class="event-source">${event.source}</span>
                        <span class="event-time">${time}</span>
                    </div>
                `;
            }).join('');
            eventCountEl.textContent = `${events.length} events`;
        }

        function renderAnomalies() {
            anomalyFeedEl.innerHTML = anomalies.map(anomaly => {
                const time = new Date(anomaly.timestamp).toLocaleTimeString();
                return `
                    <div class="anomaly-item">
                        <div class="anomaly-header">
                            <span class="anomaly-metric">${anomaly.source} - ${anomaly.metric}</span>
                            <span class="anomaly-confidence">Conf: ${anomaly.confidence.toFixed(2)}</span>
                        </div>
                        <div class="anomaly-details">
                            Expected: ${anomaly.expected.toFixed(2)} | Actual: ${anomaly.value.toFixed(2)}
                        </div>
                    </div>
                `;
            }).join('');
            anomalyCountEl.textContent = anomalies.length;
        }

        function renderForecasts() {
            forecastFeedEl.innerHTML = Object.values(forecasts).map(forecast => {
                return `
                    <div class="forecast-item">
                        <div>
                            <div class="forecast-metric">${forecast.source}_${forecast.metric}</div>
                            <div class="forecast-ci">CI: ±${forecast.confidence_interval.toFixed(2)}</div>
                        </div>
                        <div class="forecast-value">${forecast.predicted.toFixed(2)}</div>
                    </div>
                `;
            }).join('');
            forecastCountEl.textContent = `${Object.keys(forecasts).length} metrics`;
        }

        function renderSourceRates(rates) {
            const sources = ['dynatrace', 'prometheus', 'splunk', 'riverbed'];
            sourceRatesEl.innerHTML = sources.map(source => {
                const rate = rates[source] || 0;
                return `
                    <div class="rate-card">
                        <h3>${source.charAt(0).toUpperCase() + source.slice(1)}</h3>
                        <div class="rate-value">${rate.toFixed(1)}<span class="rate-unit">/s</span></div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
